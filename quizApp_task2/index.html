<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Quiz App</h1>

    <!-- Question -->
    <div class="card">
      <h2 id="question">Question</h2>
      <div id="options"></div>
    </div>

    <!-- Next Button -->
    <button onclick="nextQuestion()">Next</button>

    <!-- Score -->
    <h3 id="score"></h3>
  </div>

  <script src="script.js"></script>
</body>
</html>
